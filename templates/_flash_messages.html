{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-stack">
        {% for category, message in messages %}
        <div class="flash-message {{ 'error' if category in ['error', 'danger'] else category }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
{% endwith %}
