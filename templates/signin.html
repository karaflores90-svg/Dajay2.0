<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Cinemique</title>
    <script>document.documentElement.classList.add('app-loading');</script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            margin: 0;
            background:
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('{{ url_for("static", filename="background1.jpg") }}') center/cover fixed;
        }

        .auth-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .auth-card {
            width: min(430px, 100%);
            padding: 34px;
            background: rgba(18, 18, 18, 0.94);
        }

        .auth-card h1 {
            margin: 0 0 12px;
        }

        .auth-card .search-input:hover {
            background: #2a2a2a;
            border-color: #444;
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>
<main class="auth-shell">
    <section class="auth-card section-card">
        {% include '_flash_messages.html' %}
        <h1>Sign In</h1>
        <p style="color: #b7b7b7; margin-bottom: 22px;">Continue to browse movies and select showtimes.</p>
        <form action="/login_process" method="POST" style="display: grid; gap: 14px;">
            <input class="search-input" type="email" name="email" placeholder="Email" required>
            <input class="search-input" type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-submit btn-primary" data-loading-text="Signing In...">Sign In</button>
        </form>
        <p style="margin-top: 18px; color: #bdbdbd;">
            Don't have an account yet? <a href="{{ url_for('signup_page') }}" style="color: #ff8d5e;">Sign up here.</a>
        </p>
    </section>
</main>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
