<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Movies - Cinemique</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Navbar & Table Styles */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .modern-table { width: 100%; border-collapse: collapse; background: #222; border-radius: 10px; overflow: hidden; }
        .modern-table th { background: #333; padding: 15px; text-align: left; color: #ff4500; }
        .modern-table td { padding: 15px; border-bottom: 1px solid #333; }

        .movie-poster-sm { width: 50px; height: 75px; object-fit: cover; border-radius: 4px; }

        /* Button Styles */
        .btn-edit {
            color: #00d4ff;
            text-decoration: none;
            margin-right: 15px;
            border: 1px solid #00d4ff;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-edit:hover { background: #00d4ff; color: #1a1a1a; }

        .btn-delete {
            color: #ff4444;
            text-decoration: none;
            border: 1px solid #ff4444;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header class="navbar">
    <h2 style="color: #ff4500; margin: 0; letter-spacing: 2px;">CINEMIQUE</h2>
    <nav class="nav-links">
        <li><a href="/admin">Dashboard</a></li>
        <li><a href="/admin/movies" class="active">Manage Movies</a></li>
        <li><a href="{{ url_for('home') }}" target="_blank">View Site</a></li>
    </nav>
    <div class="auth-buttons">
        <span class="user-greeting">Hi, {{ name }}!</span>
    </div>
</header>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    <h2 style="color: #ff4500;">Movie Library Management</h2>
    <a href="/admin" class="btn-add">+ Add New Movie</a>
</div>

    <table class="modern-table">
        <thead>
            <tr>
                <th>Poster</th>
                <th>Title</th>
                <th>Genre</th>
                <th>Status</th>
                <th style="text-align: right;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for movie in movies %}
            <tr>
                <td><img src="{{ url_for('static', filename=movie.image) }}" class="movie-poster-sm"></td>
                <td><strong>{{ movie.title }}</strong></td>
                <td><span style="text-transform: capitalize; color: #aaa;">{{ movie.genre }}</span></td>
                <td>
                    <span style="color: {{ '#00ff88' if movie.status == 'Now Showing' else '#ffae00' }};">
                        {{ movie.status }}
                    </span>
                </td>
                <td style="text-align: right;">
                    <a href="/edit_movie_page/{{ movie.id }}" class="btn-edit">Edit Movie</a>

                    <a href="{{ url_for('delete_movie', id=movie.id) }}" class="btn-delete"
                       onclick="return confirm('Sigurado ka nga i-delete kini?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
